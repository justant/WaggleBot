# GPU 환경: RTX 3090 24GB (Quality-First 2막 구조)
services:
  db:
    image: mariadb:11
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-wagglebot_root}
      MARIADB_DATABASE: wagglebot
      MARIADB_USER: wagglebot
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-wagglebot}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p${MARIADB_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  crawler:
    build: .
    restart: unless-stopped
    volumes:
      - ./:/app
      - /app/venv
      - /app/__pycache__
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://wagglebot:${MARIADB_PASSWORD:-wagglebot}@db/wagglebot
      CRAWL_INTERVAL_HOURS: ${CRAWL_INTERVAL_HOURS:-1}
    command: python main.py

  dashboard:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    volumes:
      - ./:/app
      - ./media:/app/media
      - /app/venv
      - /app/__pycache__
    environment:
      DATABASE_URL: mysql+pymysql://wagglebot:${MARIADB_PASSWORD:-wagglebot}@db/wagglebot
      OLLAMA_HOST: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2.5:7b}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: streamlit run dashboard/app.py --server.port 8501 --server.headless true --server.address 0.0.0.0

  fish-speech:
    image: fishaudio/fish-speech:v1.5.1
    container_name: fish-speech
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "8080:8080"
    volumes:
      - ./assets/voices:/opt/fish-speech/references
      - ./checkpoints:/opt/fish-speech/checkpoints
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    working_dir: /opt/fish-speech
    # v1.5.1 이미지: /opt/fish-speech/ 설치, common.sh 없음, python 직접 실행
    entrypoint:
      - /bin/bash
      - -c
      - >-
        python tools/api_server.py
        --listen 0.0.0.0:8080
        --llama-checkpoint-path checkpoints/fish-speech-1.5
        --decoder-checkpoint-path checkpoints/fish-speech-1.5/firefly-gan-vq-fsq-8x1024-21hz-generator.pth
        --decoder-config-name firefly_gan_vq
        --half
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/').read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  comfyui:
    build:
      context: .
      dockerfile: Dockerfile.comfyui
    container_name: comfyui
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "8188:8188"
    volumes:
      - ./checkpoints/ltx-2:/comfyui/models/checkpoints
      - ./checkpoints/text_encoders:/comfyui/models/text_encoders
      - ./checkpoints/latent_upscale_models:/comfyui/models/latent_upscale_models
      - ./checkpoints/loras:/comfyui/models/loras
      - ./checkpoints/diffusion_models:/comfyui/models/diffusion_models
      - ./checkpoints/vae:/comfyui/models/vae
      - ./ai_worker/video/workflows:/comfyui/custom_workflows
      - ./media/tmp/videos:/comfyui/output
    # GGUF Q4 전환 (2026-03-03):
    #   UNet: GGUF Q4(~12.7GB) — --lowvram streaming (FP8 20GB 대비 4x 작은 데이터)
    #   텍스트 인코더: Gemma 3 12B BF16 — CPU 실행 (max_length=256으로 ~3분)
    #   VAE: BF16(~2.3GB)
    # --lowvram: 텍스트 인코더(24.4GB BF16)가 24GB VRAM 초과 → CPU 오프로드 필수
    #   GGUF Q4 UNet은 streaming 데이터량 1/4 → 기존 FP8 대비 전송 속도 4x 향상
    # --fp8_e4m3fn-text-enc: 기본 파이프라인(non-custom-node)용 유지
    command: >-
      python3 main.py
      --listen 0.0.0.0
      --lowvram
      --reserve-vram 2
      --fp8_e4m3fn-text-enc
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # CUBLAS 버전 일치: pip nvidia-cublas(13.1) + system cublasLt(13.0) 충돌 방지
      - LD_LIBRARY_PATH=/usr/local/lib/python3.11/dist-packages/nvidia/cu13/lib:/usr/local/cuda/lib64
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8188/system_stats').read()"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 300s

  ai_worker:
    build: .
    restart: unless-stopped
    stop_grace_period: 120s
    volumes:
      - ./:/app
      - ./media:/app/media
      - /app/venv
      - /app/__pycache__
      # WSL2: libnvidia-encode.so.1 등 NVENC 라이브러리 마운트
      - /usr/lib/wsl/lib:/usr/lib/wsl/lib:ro
    environment:
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2.5:7b}"
      LLM_MODEL: "${OLLAMA_MODEL:-qwen2.5:7b}"
      DEFAULT_MODEL: "${OLLAMA_MODEL:-qwen2.5:7b}"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      # WSL2: NVENC 라이브러리 경로
      LD_LIBRARY_PATH: /usr/lib/wsl/lib
      DATABASE_URL: mysql+pymysql://wagglebot:${MARIADB_PASSWORD:-wagglebot}@db/wagglebot
      OLLAMA_HOST: "http://host.docker.internal:11434"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      MEDIA_DIR: /app/media
      FISH_SPEECH_URL: "http://fish-speech:8080"
      COMFYUI_URL: "http://comfyui:8188"
      VIDEO_GEN_ENABLED: "${VIDEO_GEN_ENABLED:-false}"
      VIDEO_OUTPUT_DIR: "/app/media/tmp/videos"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      db:
        condition: service_healthy
      fish-speech:
        condition: service_healthy
      comfyui:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python -m ai_worker.core.main

  monitoring:
    build: .
    restart: unless-stopped
    volumes:
      - ./:/app
      - /app/venv
      - /app/__pycache__
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://wagglebot:${MARIADB_PASSWORD:-wagglebot}@db/wagglebot
      MONITORING_ENABLED: ${MONITORING_ENABLED:-true}
      HEALTH_CHECK_INTERVAL: ${HEALTH_CHECK_INTERVAL:-300}
      GPU_TEMP_WARNING: ${GPU_TEMP_WARNING:-75}
      GPU_TEMP_CRITICAL: ${GPU_TEMP_CRITICAL:-80}
      DISK_USAGE_WARNING: ${DISK_USAGE_WARNING:-80}
      DISK_USAGE_CRITICAL: ${DISK_USAGE_CRITICAL:-90}
      MEMORY_USAGE_WARNING: ${MEMORY_USAGE_WARNING:-85}
      MEMORY_USAGE_CRITICAL: ${MEMORY_USAGE_CRITICAL:-95}
      EMAIL_ALERTS_ENABLED: ${EMAIL_ALERTS_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      SLACK_ALERTS_ENABLED: ${SLACK_ALERTS_ENABLED:-false}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    command: python -m monitoring.daemon

  telegram-bridge:
    build:
      context: ./claude-telegram-bridge
      dockerfile: Dockerfile
    container_name: telegram-bridge
    restart: unless-stopped
    ports:
      - "${HOOKS_PORT:-3847}:3847"
    volumes:
      - ./:/wagglebot:ro
      - ./_request:/wagglebot/_request
      - ./_result:/wagglebot/_result
      - ./claude-telegram-bridge/data:/app/data
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ALLOWED_USER_IDS: ${ALLOWED_USER_IDS}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      WAGGLEBOT_ROOT: /wagglebot
      HOOKS_PORT: "3847"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DAILY_BRIEF_ENABLED: ${DAILY_BRIEF_ENABLED:-false}
      DAILY_BRIEF_CRON: ${DAILY_BRIEF_CRON:-0 9 * * *}

volumes:
  mariadb_data:
