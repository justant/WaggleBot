# ── 한국어 문장 추정 ──
chars_per_sentence: 25

# ── 전략 임계값 ──
strategy_thresholds:
  image_heavy: 0.7   # ratio >= 0.7 → image_heavy
  balanced: 0.3       # 0.3 <= ratio < 0.7 → balanced

# ── text_only 스택 크기 ──
stack_size:
  image_heavy: 1
  balanced: 2
  text_heavy: 3

# ── body 항목 수 범위 ──
body_items:
  min: 6
  max: 23

# ── 강조 키워드 ──
highlight_keywords:
  - 반전
  - 충격
  - 결과
  - 결론
  - 사실
  - 진짜
  - 알고보니

# ── Phase 4: LLM Scene Director ──
scene_director:
  mode: llm                    # "llm" | "rule_based" (폴백)
  max_video_clips: 5           # 콘텐츠당 최대 비디오 클립 수
  target_clip_duration:
    min: 3.5                   # 비디오 클립 최소 길이 (초)
    max: 5.0                   # 비디오 클립 최대 길이 (초)
  max_group_size: 5            # 한 그룹에 포함될 수 있는 최대 씬 수
  tts_chars_per_sec: 4.0       # TTS 예상 발화 속도 (자/초)
  itv_score_threshold: 0.6     # ITV 적합성 임계값
  llm_timeout_sec: 60          # LLM 호출 타임아웃
  fallback_on_llm_fail: true   # LLM 실패 시 rule_based 폴백
  oversized_scene_video: true  # 5초 초과 단일 씬의 비디오 허용 여부
